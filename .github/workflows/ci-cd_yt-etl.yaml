name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - "feature/*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed-files-build
        uses: tj-actions/changed-files@v45
        with:
          files: |
            dockerfile
            requirements.txt

      - name: Set up Docker Buildx
        if: steps.changed-files-build.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: steps.changed-files-build.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        if: steps.changed-files-build.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          docker buildx build --push \
            --file dockerfile \
            --tag ${{ vars.DOCKERHUB_NAMESPACE }}/${{ vars.DOCKERHUB_REPOSITORY }}:latest \
            --tag ${{ vars.DOCKERHUB_NAMESPACE }}/${{ vars.DOCKERHUB_REPOSITORY }}:${{ github.sha }} \
            .

  unit-and-integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    env:
      API_KEY: ${{ secrets.API_KEY }}
      AIRFLOW_VAR_API_KEY: ${{ secrets.API_KEY }}
      CHANNEL_HANDLE: ${{ vars.CHANNEL_HANDLE }}
      AIRFLOW_VAR_CHANNEL_HANDLE: ${{ vars.CHANNEL_HANDLE }}
      BIGQUERY_PROJECT_ID: ${{ vars.BIGQUERY_PROJECT_ID }}
      BIGQUERY_LOCATION: ${{ vars.BIGQUERY_LOCATION || 'US' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed-files-tests
        uses: tj-actions/changed-files@v45
        with:
          files: |
            dags/**
            include/**
            tests/**
            dockerfile
            requirements.txt

      - name: Build test image
        if: steps.changed-files-tests.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: docker build --file dockerfile --tag yt-etl-ci .

      - name: Run Unit and Integration Tests
        if: steps.changed-files-tests.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          docker run --rm --user root \
            -e API_KEY \
            -e AIRFLOW_VAR_API_KEY \
            -e CHANNEL_HANDLE \
            -e AIRFLOW_VAR_CHANNEL_HANDLE \
            -e BIGQUERY_PROJECT_ID \
            -e BIGQUERY_LOCATION \
            -e GOOGLE_APPLICATION_CREDENTIALS \
            -v "${{ github.workspace }}:/opt/airflow" \
            -w /opt/airflow \
            --entrypoint bash \
            yt-etl-ci -c "pytest tests/ -v"

      - name: Run DAG Import Check
        if: steps.changed-files-tests.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          docker run --rm --user root \
            -e API_KEY \
            -e AIRFLOW_VAR_API_KEY \
            -e CHANNEL_HANDLE \
            -e AIRFLOW_VAR_CHANNEL_HANDLE \
            -e BIGQUERY_PROJECT_ID \
            -e BIGQUERY_LOCATION \
            -v "${{ github.workspace }}:/opt/airflow" \
            -w /opt/airflow \
            --entrypoint bash \
            yt-etl-ci -c "airflow dags list --subdir dags/main.py"
